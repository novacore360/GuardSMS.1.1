workflows:
  android-workflow:
    name: GuardSMS Android Build
    max_build_duration: 60
    environment:
      android_signing:
        - guardsms_keystore
      groups:
        - guardsms_env
      vars:
        SUPABASE_URL: https://lrnvnbnnxuynaalggdtr.supabase.co
        # SUPABASE_ANON_KEY should be set in Codemagic environment variables group "guardsms_env"
      java: 17

    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/local.properties"

      - name: Regenerate Gradle wrapper jar (if missing)
        script: |
          cd $CM_BUILD_DIR
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.4
          fi
          chmod +x gradlew

      - name: Build debug APK
        script: |
          cd $CM_BUILD_DIR
          ./gradlew assembleDebug \
            -PSUPABASE_URL="$SUPABASE_URL" \
            -PSUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"

      - name: Build release APK
        script: |
          cd $CM_BUILD_DIR
          ./gradlew assembleRelease \
            -PSUPABASE_URL="$SUPABASE_URL" \
            -PSUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"

    artifacts:
      - app/build/outputs/**/*.apk
      - app/build/outputs/**/*.aab

    publishing:
      email:
        recipients:
          - jamesbryllefahardo@gmail.com
        notify:
          success: true
          failure: true
